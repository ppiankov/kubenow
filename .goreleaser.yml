version: 2

project_name: kubenow

before:
  hooks:
    - go mod download
    - go mod verify

builds:
  - main: ./cmd/kubenow/
    binary: kubenow
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  disable: true

brews:
  - repository:
      owner: ppiankov
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/ppiankov/kubenow"
    description: "Kubernetes resource analysis and cost optimization — deterministic analysis, policy-gated apply, real-time monitoring"
    license: MIT
    install: |
      bin.install "kubenow"
    test: |
      assert_match version.to_s, shell_output("#{bin}/kubenow version")
